services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka-broker
    ports:
        - "9092:9092"
    environment:
      # --- KRaft core config ---
      # This single node plays both roles: message broker AND metadata
      # controller (the Raft quorum member). In production, controller
      # and broker roles are often split across dedicated nodes.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # --- Listener config ---
      # Two listener names because we need different addresses depending
      # on who's connecting: other containers (kafka-ui) use the internal
      # Docker network name "kafka", but your Spring Boot apps running on
      # your host machine need "localhost".
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # --- Local-dev-only tuning ---
      # Single-node cluster: replication factor of 1 everywhere (no
      # redundancy). Never use these values in production.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Auto-create topics on first publish — convenient for learning,
      # explicitly called out as a production anti-pattern below.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kraft
      # Uses the internal Docker network listener (kafka:29092), not
      # localhost — kafka-ui runs *inside* the Docker network, unlike
      # your Spring Boot apps which run on your host.
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
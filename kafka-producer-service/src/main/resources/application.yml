server:
    port: 8081

spring:
    application:
        name: kafka-producer-service
    kafka:
        bootstrap-servers: ${KAFAK_BOOTSTRAP_SERVERS:localhost:9092}
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.apache.kafka.common.serialization.StringSerializer
            acks: all
            properties:
                enable.idempotence: true
                max.in.flight.requests.per.connection: 5
                # retries defaults to Integer.MAX_VALUE once idempotence is on;
                # delivery.timeout.ms is the real ceiling on total retry duration.
                delivery.timeout.ms: 120000

app:
    kafka:
        topic:
            orders-events: ${ORDERS_TOPIC_NAME:orders-events}

management:
    endpoints:
        web:
            exposure:
                include: health, info
    endpoint:
        health:
            show-details: always

logging:
    level:
        com.kafkalearning: INFO
        com.springframework.kafka: WARN
